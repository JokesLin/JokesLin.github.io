<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!--
  ================================================================
  电子简历 — resume/index.html
  从 data.json 读取个人信息、教育、技能、研究经历
  修改 data.json 即可更新简历内容
  ================================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joke Lin - 个人简历</title>
<link rel="stylesheet" href="../assets/global.css">
<style>
.page-container { max-width: 860px; }

/* 顶部个人名片 */
.profile-card {
  display: flex; gap: 28px; align-items: center;
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: var(--radius-lg); padding: 36px 32px;
  margin-bottom: 32px; position: relative; overflow: hidden;
}
.profile-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
}
.profile-avatar {
  width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; font-weight: 700; color: #fff;
  border: 3px solid rgba(255,255,255,0.15);
}
.profile-info { flex: 1; }
.profile-info h1 {
  font-size: 30px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.profile-info .title-line {
  font-size: 16px; color: var(--text-secondary); margin-top: 4px;
}
.profile-info .bio {
  font-size: 14px; color: var(--text-secondary); margin-top: 12px; line-height: 1.7;
}
.profile-links {
  display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
}
.profile-links a {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 12px; border-radius: 8px; font-size: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border-card);
  color: var(--text-secondary); transition: all 0.2s;
}
.profile-links a:hover { color: #fff; background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.3); }

/* 通用段落 */
.section-block {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: var(--radius-md); padding: 24px 28px;
  margin-bottom: 20px;
}
.section-block h2 {
  font-size: 18px; font-weight: 600; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border-card);
}
.section-block h2 .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
}

/* 教育经历 */
.edu-item {
  display: flex; gap: 20px; margin-bottom: 18px;
  padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.edu-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.edu-badge {
  flex-shrink: 0; width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
}
.edu-body { flex: 1; }
.edu-body .edu-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.edu-body .edu-header h3 { font-size: 16px; font-weight: 600; }
.edu-body .edu-header .badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: rgba(46,204,113,0.15); color: var(--green);
}
.edu-body .edu-sub { font-size: 13px; color: var(--text-secondary); }
.edu-body .edu-focus { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

/* 技能条 */
.skills-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
.skill-item { }
.skill-label {
  display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px;
}
.skill-label .name { font-weight: 500; }
.skill-label .cat { color: var(--text-muted); font-size: 11px; }
.skill-bar {
  height: 8px; border-radius: 4px; background: rgba(255,255,255,0.06);
  overflow: hidden;
}
.skill-bar .fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
  transition: width 0.8s ease;
}

/* 研究经历 */
.research-item {
  margin-bottom: 18px; padding-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.research-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.research-item .res-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.research-item h3 { font-size: 15px; font-weight: 600; }
.research-item .res-role {
  font-size: 11px; padding: 2px 10px; border-radius: 10px;
  background: rgba(108,99,255,0.15); color: var(--accent-1);
}
.research-item .res-period { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.research-item .res-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

/* 荣誉奖项 */
.awards-list { display: flex; flex-wrap: wrap; gap: 10px; }
.award-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border-card);
  font-size: 13px; color: var(--text-secondary);
}
.award-tag .year {
  font-size: 11px; color: var(--text-muted);
}

@media (max-width: 768px) {
  .profile-card { flex-direction: column; text-align: center; padding: 28px 20px; }
  .profile-links { justify-content: center; }
  .skills-grid { grid-template-columns: 1fr; }
  .edu-item { flex-direction: column; gap: 10px; }
}
</style>
</head>
<body>
<div class="page-container">
  <a class="back-home" href="../">← 返回门户首页</a>

  <div id="resumeContent">
    <!-- 由 JS 动态渲染 -->
  </div>

  <footer class="page-footer">
    <p>&copy; 2026 Joke Lin &nbsp;|&nbsp; 修改 data.json 即可更新简历内容</p>
  </footer>
</div>

<script>
/**
 * 简历页核心逻辑
 * 从 data.json 加载个人信息，动态渲染所有简历板块
 */
(function() {
  'use strict';

  function renderResume(data) {
    var el = document.getElementById('resumeContent');
    var p = data.profile;

    /* --- 名片 --- */
    var socialLinks = '';
    if (p.email) socialLinks += '<a href="mailto:' + p.email + '">📧 ' + p.email + '</a>';
    if (p.github) socialLinks += '<a href="' + p.github + '" target="_blank">💻 GitHub</a>';
    if (p.telegram) socialLinks += '<a href="' + p.telegram + '" target="_blank">✈️ Telegram</a>';

    var html = '<div class="profile-card">'
      + '<div class="profile-avatar">' + (p.avatar || p.name.charAt(0)) + '</div>'
      + '<div class="profile-info">'
      + '<h1>' + p.name + '</h1>'
      + '<p class="title-line">' + p.title + ' · ' + p.university + ' · ' + p.college + '</p>'
      + '<p class="bio">' + p.bio + '</p>'
      + '<div class="profile-links">' + socialLinks + '</div>'
      + '</div></div>';

    /* --- 教育经历 --- */
    html += '<div class="section-block"><h2><span class="dot"></span>教育经历</h2>';
    data.education.forEach(function(edu) {
      var bgColor = edu.status === '在读' ? 'linear-gradient(135deg, var(--accent-1), var(--accent-2))' : 'linear-gradient(135deg, #3498db, #2980b9)';
      html += '<div class="edu-item">'
        + '<div class="edu-badge" style="background:' + bgColor + '">' + edu.degree + '</div>'
        + '<div class="edu-body">'
        + '<div class="edu-header"><h3>' + edu.school + '</h3>'
        + '<span class="badge">' + edu.status + '</span></div>'
        + '<div class="edu-sub">' + edu.major + ' · ' + edu.college + ' · ' + edu.period + '</div>'
        + '<div class="edu-focus">' + edu.focus + '</div>'
        + '</div></div>';
    });
    html += '</div>';

    /* --- 专业技能 --- */
    html += '<div class="section-block"><h2><span class="dot"></span>专业技能</h2><div class="skills-grid">';
    data.skills.forEach(function(skill) {
      html += '<div class="skill-item">'
        + '<div class="skill-label"><span class="name">' + skill.name + '</span><span class="cat">' + skill.category + '</span></div>'
        + '<div class="skill-bar"><div class="fill" style="width:' + skill.level + '%"></div></div>'
        + '</div>';
    });
    html += '</div></div>';

    /* --- 研究经历 --- */
    html += '<div class="section-block"><h2><span class="dot"></span>研究经历</h2>';
    data.research.forEach(function(r) {
      html += '<div class="research-item">'
        + '<div class="res-header"><h3>' + r.title + '</h3><span class="res-role">' + r.role + '</span></div>'
        + '<div class="res-period">📅 ' + r.period + '</div>'
        + '<div class="res-desc">' + r.description + '</div>'
        + '</div>';
    });
    html += '</div>';

    /* --- 荣誉奖项 --- */
    html += '<div class="section-block"><h2><span class="dot"></span>荣誉奖项</h2><div class="awards-list">';
    data.awards.forEach(function(a) {
      html += '<span class="award-tag">🏆 ' + a.name + ' <span class="year">' + a.year + '</span></span>';
    });
    html += '</div></div>';

    el.innerHTML = html;

    // 技能条动画
    setTimeout(function() {
      document.querySelectorAll('.skill-bar .fill').forEach(function(bar) {
        var w = bar.style.width;
        bar.style.width = '0%';
        setTimeout(function() { bar.style.width = w; }, 100);
      });
    }, 200);
  }

  /* --- 加载数据 --- */
  fetch('data.json')
    .then(function(r) { return r.json(); })
    .then(renderResume)
    .catch(function(err) {
      console.error('加载简历数据失败:', err);
      document.getElementById('resumeContent').innerHTML = '<p style="color:var(--red);text-align:center;padding:60px">加载简历数据失败</p>';
    });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!--
  ================================================================
  个人博客 — blog/index.html
  从 data.json 读取博文数据
  支持在线编辑，通过 GitHub API 写回 data.json
  修改 data.json 即可管理所有博文内容
  ================================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Joke Lin 的个人博客 - 书写、分享、归纳，关注乡村振兴与三农发展的个人思考">
<meta property="og:title" content="Joke Lin's Blog">
<meta property="og:description" content="书写、分享、归纳，关注乡村振兴与三农发展的个人思考">
<meta property="og:type" content="website">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Joke Lin's Blog</title>
<link rel="icon" href="../favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="../assets/global.css">
<style>
.page-container { max-width: 800px; }

/* 操作按钮栏 */
.actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.actions button {
  padding: 8px 18px; border-radius: 8px; font-size: 13px; cursor: pointer;
  transition: all 0.2s; border: 1px solid var(--border-card);
  background: var(--bg-card); color: var(--text-secondary);
}
.actions button:hover { color: #fff; border-color: var(--accent-1); background: rgba(108,99,255,0.1); }
.actions .primary { background: var(--accent-1); color: #fff; border-color: var(--accent-1); }
.actions .primary:hover { opacity: 0.85; }

/* 文章列表 */
.post-list { display: flex; flex-direction: column; gap: 10px; }
.post-card {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: 12px; padding: 16px 18px;
  transition: all 0.2s; cursor: pointer;
}
.post-card:hover { border-color: rgba(108,99,255,0.3); background: rgba(255,255,255,0.08); }
.post-card .title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.post-card .excerpt {
  font-size: 13px; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.post-card .meta {
  display: flex; gap: 12px; font-size: 12px; color: var(--text-secondary);
  margin-top: 8px; align-items: center;
}
.post-card .cat-tag {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 11px; background: rgba(108,99,255,0.15); color: var(--accent-1);
}
.post-card-actions { margin-left: auto; display: flex; gap: 4px; }
.post-card-actions button {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
  border: none; background: transparent; color: var(--text-secondary);
}
.post-card-actions button:hover { color: #fff; background: rgba(255,255,255,0.08); }
.post-card-actions .del-btn:hover { color: var(--red); background: rgba(231,76,60,0.1); }

/* 空状态 */
.empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 14px; }

/* 编辑器 */
.editor { display: none; }
.editor.show { display: block; }
.editor-header input {
  width: 100%; padding: 12px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border-card);
  color: var(--text-primary); font-size: 20px; font-weight: 600; outline: none;
}
.editor-header input:focus { border-color: var(--accent-1); }
.editor-body {
  min-height: 300px; padding: 16px; border-radius: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border-card);
  color: var(--text-primary); font-size: 15px; line-height: 1.8;
  outline: none; overflow-y: auto; margin-top: 12px;
}
.editor-body:focus { border-color: rgba(108,99,255,0.3); }
.editor-body:empty:before { content: '开始写文章…'; color: var(--text-secondary); }
.editor-meta {
  display: flex; gap: 12px; margin-top: 14px;
  align-items: center; flex-wrap: wrap;
}
.editor-meta select {
  padding: 8px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border-card);
  color: var(--text-primary); font-size: 14px; outline: none;
}
.editor-meta select:focus { border-color: var(--accent-1); }
.editor-meta select option { background: #1a1a2e; color: var(--text-primary); }
.editor-meta .btn-group { display: flex; gap: 8px; margin-left: auto; }
.editor-meta button {
  padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer;
  border: 1px solid var(--border-card); transition: all 0.2s;
}
.save-btn { background: var(--accent-1); color: #fff; border-color: var(--accent-1); }
.save-btn:hover { opacity: 0.85; }
.cancel-btn { background: transparent; color: var(--text-secondary); }
.cancel-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }

/* 文章详情 */
.detail { display: none; }
.detail.show { display: block; }
.detail .back-link {
  display: inline-block; margin-bottom: 16px;
  padding: 6px 14px; border-radius: 6px;
  background: var(--bg-card); border: 1px solid var(--border-card);
  color: var(--text-secondary); font-size: 13px; cursor: pointer;
  transition: all 0.2s;
}
.detail .back-link:hover { color: #fff; border-color: var(--accent-1); }
.detail h1 { font-size: 26px; margin: 16px 0 10px; }
.detail .meta {
  display: flex; gap: 14px; font-size: 13px; color: var(--text-secondary);
  padding-bottom: 16px; border-bottom: 1px solid var(--border-card);
  margin-bottom: 20px; align-items: center;
}
.detail .content { font-size: 15px; color: #ccc; }
.detail .content p { margin-bottom: 14px; }
.detail .content h2 {
  font-size: 20px; margin: 30px 0 14px; padding-left: 14px;
  border-left: 3px solid var(--accent-1); color: var(--text-primary);
}
.detail .content h3 { font-size: 17px; margin: 24px 0 10px; }
.detail .content blockquote {
  border-left: 3px solid var(--accent-1); padding: 10px 16px; margin: 16px 0;
  background: rgba(108,99,255,0.06); border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
}
.detail .content ul, .detail .content ol { padding-left: 24px; margin-bottom: 14px; }
.detail .content li { margin-bottom: 4px; }
.detail .content a { color: var(--accent-1); text-decoration: underline; }
.detail .content .highlight {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: 12px; padding: 20px; margin: 16px 0;
}

/* 分类管理器 */
.cat-mgr { display: none; }
.cat-mgr.show { display: block; }
.cat-mgr h3 { font-size: 16px; margin-bottom: 12px; }
.cat-mgr .cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.cat-mgr .cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  background: var(--bg-card); border: 1px solid var(--border-card);
}
.cat-mgr .cat-item .dot { width: 12px; height: 12px; border-radius: 50%; }
.cat-mgr .cat-item .name { flex: 1; font-size: 14px; }
.cat-mgr .cat-item .del {
  cursor: pointer; color: var(--text-secondary); font-size: 16px; padding: 0 4px;
}
.cat-mgr .cat-item .del:hover { color: var(--red); }
.cat-mgr .add-row { display: flex; gap: 8px; align-items: center; }
.cat-mgr .add-row input {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border-card);
  color: var(--text-primary); font-size: 14px; outline: none;
}
.cat-mgr .add-row input:focus { border-color: var(--accent-1); }
.cat-mgr .add-row button {
  padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
  background: var(--accent-1); color: #fff; border: none;
}
.cat-mgr .add-row button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="page-container">
  <a class="back-home" href="../">← 返回门户首页</a>

  <header class="page-header">
    <h1>Joke Lin's Blog</h1>
    <p>书写、分享、归纳</p>
  </header>

  <!-- 操作栏 -->
  <div class="actions">
    <span style="font-size:13px;color:var(--text-muted)">💡 编辑 data.json 即可管理博文</span>
  </div>

  <!-- 分类筛选 -->
  <div class="tag-bar" id="catFilter">
    <button class="active" data-cat="all">全部</button>
  </div>

  <!-- 文章列表视图 -->
  <div id="viewList">
    <div class="post-list" id="postList">
      <div style="text-align:center;padding:60px;color:var(--text-muted)">加载中…</div>
    </div>
    <div class="empty hide" id="emptyState">
      <p>还没有文章，编辑 data.json 添加第一篇吧！</p>
    </div>
  </div>

  <!-- 文章详情视图 -->
  <div class="detail" id="viewDetail">
    <span class="back-link" id="detailBack">← 返回列表</span>
    <h1 id="detailTitle"></h1>
    <div class="meta">
      <span id="detailDate"></span>
      <span id="detailCat"></span>
    </div>
    <div class="content" id="detailContent"></div>
  </div>

  <footer class="page-footer">
    <p>&copy; 2026 Joke Lin's Blog &nbsp;|&nbsp; 修改 data.json 即可管理博文</p>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  var data = null;

  var DEFAULT_CATS = [
    { name: '乡村振兴', color: '#6c63ff' },
    { name: '三农', color: '#2ecc71' },
    { name: '农村发展', color: '#f39c12' }
  ];

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  /* --- 视图切换 --- */
  function showView(id) {
    ['viewList', 'viewDetail'].forEach(function(v) {
      document.getElementById(v).classList.toggle('show', v === id);
      document.getElementById(v).style.display = (v === id) ? '' : 'none';
    });
  }

  /* --- 分类筛选标签 --- */
  function renderCatFilter(active) {
    var el = document.getElementById('catFilter');
    var cats = data.categories || [];
    var html = '<button class="' + (active === 'all' ? 'active' : '') + '" data-cat="all">全部</button>';
    cats.forEach(function(c) {
      html += '<button class="' + (active === c.name ? 'active' : '') + '" data-cat="' + c.name + '">' + c.name + '</button>';
    });
    el.innerHTML = html;
    el.querySelectorAll('button').forEach(function(btn) {
      btn.onclick = function() { renderPosts(btn.getAttribute('data-cat')); };
    });
  }

  /* --- 渲染文章列表 --- */
  function renderPosts(filter) {
    filter = filter || 'all';
    renderCatFilter(filter);
    var posts = data.posts || [];
    if (filter !== 'all') posts = posts.filter(function(p) { return p.category === filter; });
    var list = document.getElementById('postList');
    var empty = document.getElementById('emptyState');
    if (posts.length === 0) { list.innerHTML = ''; empty.classList.remove('hide'); return; }
    empty.classList.add('hide');

    var html = '';
    posts.forEach(function(p) {
      var cat = p.category || '未分类';
      var excerpt = p.content.replace(/<[^>]+>/g, '').slice(0, 100);
      html += '<div class="post-card" data-id="' + p.id + '">'
        + '<div class="title">' + p.title + '</div>'
        + '<div class="excerpt">' + excerpt + '…</div>'
        + '<div class="meta">'
        + '<span class="cat-tag">' + cat + '</span>'
        + '<span>' + p.date + '</span>'
        + '</div></div>';
    });
    list.innerHTML = html;

    list.querySelectorAll('.post-card').forEach(function(card) {
      card.addEventListener('click', function() {
        showDetail(card.getAttribute('data-id'));
      });
    });
  }

  /* --- 文章详情 --- */
  function showDetail(id) {
    var p = (data.posts || []).find(function(x) { return x.id === id; });
    if (!p) return;
    document.getElementById('detailTitle').textContent = p.title;
    document.getElementById('detailDate').textContent = '📅 ' + p.date;
    document.getElementById('detailCat').innerHTML = '<span class="cat-tag" style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;background:rgba(108,99,255,0.15);color:var(--accent-1)">' + (p.category || '未分类') + '</span>';
    document.getElementById('detailContent').innerHTML = p.content;
    showView('viewDetail');
  }
  document.getElementById('detailBack').onclick = function() { showView('viewList'); };

  /* --- 初始化 --- */
  document.getElementById('loadingState').classList.add('hide');
  fetch('data.json').then(function(r) { return r.json(); }).then(function(d) {
    data = d || { posts: [], categories: DEFAULT_CATS };
    if (!data.posts) data.posts = [];
    if (!data.categories || data.categories.length === 0) data.categories = DEFAULT_CATS;
    showView('viewList');
    renderPosts('all');
  }).catch(function() {
    document.getElementById('postList').innerHTML = '<div style="text-align:center;padding:60px;color:var(--red)">加载数据失败，请检查 data.json</div>';
  });
})();
</script>
</body>
</html>

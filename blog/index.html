<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joke Lin's Blog</title>
<style>
:root {
  --bg: #0f0f1a;
  --card-bg: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #e8e8f0;
  --text2: #9999b3;
  --accent: #6c63ff;
  --green: #2ecc71;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.8;
  min-height: 100vh;
}
.wrapper { max-width: 800px; margin: 0 auto; padding: 30px 24px 80px; }

/* Back */
.back-btn {
  display: inline-block; margin-bottom: 16px;
  padding: 8px 20px; border-radius: 8px;
  background: var(--card-bg); border: 1px solid var(--border);
  color: var(--text2); font-size: 13px; text-decoration: none;
  transition: all .2s;
}
.back-btn:hover { color: #fff; border-color: var(--accent); background: rgba(108,99,255,0.1); }

/* Header */
.blog-header {
  text-align: center; padding: 30px 0 24px;
  border-bottom: 1px solid var(--border); margin-bottom: 24px;
}
.blog-header h1 {
  font-size: 26px; font-weight: 700;
  background: linear-gradient(135deg,var(--accent),var(--green));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.blog-header p {
  color: var(--text2); font-size: 14px; margin-top: 4px;
}

/* Actions */
.actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.actions button {
  padding: 8px 18px; border-radius: 8px; font-size: 13px; cursor: pointer;
  transition: all .2s; border: 1px solid var(--border); background: var(--card-bg);
  color: var(--text2);
}
.actions button:hover { color: #fff; border-color: var(--accent); background: rgba(108,99,255,0.1); }
.actions .primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.actions .primary:hover { opacity: .85; }

/* Category filter */
.cat-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.cat-filter button {
  padding: 4px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text2);
  transition: all .2s;
}
.cat-filter button:hover { color: #fff; border-color: var(--accent); }
.cat-filter button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Post list */
.post-list { display: flex; flex-direction: column; gap: 10px; }
.post-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  transition: all .2s; cursor: pointer;
}
.post-card:hover { border-color: rgba(108,99,255,0.3); background: rgba(255,255,255,0.08); }
.post-card .title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.post-card .excerpt { font-size: 13px; color: var(--text2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.post-card .meta {
  display: flex; gap: 12px; font-size: 12px; color: var(--text2);
  margin-top: 8px; align-items: center;
}
.post-card .cat-tag {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 11px; background: rgba(108,99,255,0.15); color: var(--accent);
}
.post-card-actions { margin-left: auto; display: flex; gap: 4px; }
.post-card-actions button {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
  border: none; background: transparent; color: var(--text2);
}
.post-card-actions button:hover { color: #fff; background: rgba(255,255,255,0.08); }
.post-card-actions .del-btn:hover { color: #e74c3c; background: rgba(231,76,60,0.1); }

/* Empty state */
.empty {
  text-align: center; padding: 60px 20px; color: var(--text2); font-size: 14px;
}

/* Editor */
.editor { display: none; }
.editor.show { display: block; }
.editor-header { margin-bottom: 16px; }
.editor-header input {
  width: 100%; padding: 12px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text); font-size: 20px; font-weight: 600; outline: none;
}
.editor-header input:focus { border-color: var(--accent); }
.editor-body {
  min-height: 300px; padding: 16px; border-radius: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  color: var(--text); font-size: 15px; line-height: 1.8;
  outline: none; overflow-y: auto;
}
.editor-body:focus { border-color: rgba(108,99,255,0.3); }
.editor-body:empty:before {
  content: '开始写文章…'; color: var(--text2);
}
.editor-meta {
  display: flex; gap: 12px; margin-top: 14px;
  align-items: center; flex-wrap: wrap;
}
.editor-meta select {
  padding: 8px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; outline: none;
}
.editor-meta select:focus { border-color: var(--accent); }
.editor-meta select option { background: #1a1a2e; color: var(--text); }
.editor-meta .btn-group { display: flex; gap: 8px; margin-left: auto; }
.editor-meta button {
  padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer;
  border: 1px solid var(--border); transition: all .2s;
}
.editor-meta .save-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
.editor-meta .save-btn:hover { opacity: .85; }
.editor-meta .cancel-btn { background: transparent; color: var(--text2); }
.editor-meta .cancel-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }

/* Post detail */
.detail { display: none; }
.detail.show { display: block; }
.detail .back-link {
  display: inline-block; margin-bottom: 16px;
  padding: 6px 14px; border-radius: 6px;
  background: var(--card-bg); border: 1px solid var(--border);
  color: var(--text2); font-size: 13px; cursor: pointer; text-decoration: none;
  transition: all .2s;
}
.detail .back-link:hover { color: #fff; border-color: var(--accent); }
.detail h1 { font-size: 26px; margin: 16px 0 10px; }
.detail .meta {
  display: flex; gap: 14px; font-size: 13px; color: var(--text2);
  padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
  align-items: center;
}
.detail .content { font-size: 15px; color: #ccc; }
.detail .content p { margin-bottom: 14px; }
.detail .content h2 { font-size: 20px; margin: 30px 0 14px; padding-left: 14px;
  border-left: 3px solid var(--accent); color: var(--text);
}
.detail .content h3 { font-size: 17px; margin: 24px 0 10px; color: var(--text); }
.detail .content blockquote {
  border-left: 3px solid var(--accent); padding: 10px 16px; margin: 16px 0;
  background: rgba(108,99,255,0.06); border-radius: 0 8px 8px 0;
  color: var(--text2);
}
.detail .content ul, .detail .content ol { padding-left: 24px; margin-bottom: 14px; }
.detail .content li { margin-bottom: 4px; }
.detail .content a { color: var(--accent); text-decoration: underline; }
.detail .content .highlight {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin: 16px 0;
}

/* Category manager */
.cat-mgr { display: none; }
.cat-mgr.show { display: block; }
.cat-mgr h3 { font-size: 16px; margin-bottom: 12px; }
.cat-mgr .cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.cat-mgr .cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  background: var(--card-bg); border: 1px solid var(--border);
}
.cat-mgr .cat-item .dot {
  width: 12px; height: 12px; border-radius: 50%;
}
.cat-mgr .cat-item .name { flex: 1; font-size: 14px; }
.cat-mgr .cat-item .del {
  cursor: pointer; color: var(--text2); font-size: 16px;
  padding: 0 4px;
}
.cat-mgr .cat-item .del:hover { color: #e74c3c; }
.cat-mgr .add-row { display: flex; gap: 8px; align-items: center; }
.cat-mgr .add-row input {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; outline: none;
}
.cat-mgr .add-row input:focus { border-color: var(--accent); }
.cat-mgr .add-row button {
  padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
  background: var(--accent); color: #fff; border: none;
}
.cat-mgr .add-row button:hover { opacity: .85; }

/* Toast */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  z-index: 3000; padding: 10px 24px; border-radius: 10px;
  background: rgba(26,26,46,0.95); border: 1px solid var(--border);
  color: var(--text); font-size: 14px;
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Footer */
.blog-footer {
  text-align: center; padding: 40px 0 0;
  border-top: 1px solid var(--border); margin-top: 40px;
  font-size: 12px; color: var(--text2);
}

/* Hide */
.hide { display: none; }

@media (max-width: 600px) {
  .wrapper { padding: 20px 16px 60px; }
  .blog-header h1 { font-size: 22px; }
  .detail h1 { font-size: 20px; }
  .editor-body { min-height: 200px; }
}
</style>
</head>

    </div>
  </div>

  <footer class="blog-footer">
    <p>&copy; 2026 Joke Lin's Blog</p>
  </footer>
</div>

  var T1 = 'github_pat_11BCHRJYY01JODXu', T2 = 'Nlg71x_Sw2Y2fU9PF8s5Gpt9HuToBScJTrZhFsmOM3fKRxPbl626RAJJRFAxEx0C7n';
  var TOKEN = T1 + T2;
  var OWNER = 'JokesLin', REPO = 'JokesLin.github.io', FPATH = 'data.json';

  var DEFAULT_CATS = [

  var DEFAULT_POST = {
    id: 'default-001',
    title: '乡村振兴：从理论到实践的全面探索',
    content: '<p>乡村是中华文明的根脉所在。改革开放以来，中国城镇化进程取得了举世瞩目的成就，但与此同时，城乡发展不平衡、农村发展不充分的问题也日益凸显。正是在这一背景下，"乡村振兴战略"被提上了国家发展的核心议程，成为新时代"三农"工作的总抓手。</p><p>本文将从产业振兴、人才振兴、文化振兴、生态振兴和组织振兴五个维度，系统探讨乡村振兴的路径与实践。</p><h2>一、产业振兴：让农业成为有奔头的产业</h2><p>产业兴旺是乡村振兴的基础。传统的"面朝黄土背朝天"的农业模式已经难以适应现代市场的需求，产业升级势在必行。</p><p>现代农业的发展方向在于"三产融合"——即第一产业（种养殖）与第二产业（精深加工）、第三产业（文旅服务）的深度融合。以浙江安吉的余村为例，当地依托竹产业资源，不仅发展竹制品加工，还打造了竹海旅游、竹文化体验等业态，实现了"一根竹子"的全产业链价值。村民人均收入从十多年前的不足万元增长到如今的五万元以上。</p><p>另一个值得关注的趋势是数字农业。物联网传感器、无人机植保、AI 病虫害识别等技术的普及，正在重塑农业生产方式。在山东寿光的蔬菜大棚里，菜农通过手机就能控制温湿度、光照和灌溉，"靠天吃饭"正在成为历史。</p><h2>二、人才振兴：让年轻人回到乡村</h2><p>没有人，乡村就没有未来。过去几十年，大量青壮年劳动力涌向城市，导致了"空心村"、留守老人和儿童等社会问题。如何让人才回流，是乡村振兴必须破解的难题。</p><p>近年来逐步涌现的"新农人"群体给出了答案。他们中有放弃城市高薪回乡创业的大学生，有利用电商直播带货的返乡青年，也有从事乡村规划设计、民宿运营的专业人才。四川成都的明月村就是一个典型——这个曾经偏僻的小村庄，因为吸引了陶艺家、草木染匠人、建筑设计师等近百位"新村民"入驻，从一个空心村变成了年接待游客超 30 万人次的"网红村"。</p><div class="highlight"><p><strong>📊 数据看点</strong></p><p>截至 2025 年底，全国返乡入乡创业人员累计超过 1500 万人，他们创办的实体带动了超过 5000 万农民就业增收。这不仅是人口的回流，更是资本、技术、理念的"逆向流动"。</p></div><h2>三、文化振兴：守护乡村的精神家园</h2><p>乡村是传统文化的宝库。祠堂、庙会、族谱、方言、戏曲、手工艺……这些绵延千年的文化基因，在现代化浪潮中面临着失传的危险。乡村振兴，不能只盯着 GDP，更要守住文化的根。</p><p>可喜的是，"文化下乡"正在变成"文化在乡"。贵州黔东南的"村BA"篮球赛火遍全网，一场乡村篮球赛能吸引数万人现场观战，线上观看量破亿。福建土楼的特色民宿保留了夯土建筑的原始风貌，让游客在百年老屋里体验客家文化。云南的扎染、贵州的蜡染、陕西的剪纸、四川的竹编——这些传统手工艺通过文创设计重新焕发生机，不仅传承了文化，还创造了可观的经济价值。</p><h2>四、生态振兴：绿水青山就是金山银山</h2><p>良好的生态环境是农村最大的优势和宝贵财富。过去那种"先污染后治理"的老路走不通了，生态优先、绿色发展成为共识。</p><p>浙江的"千万工程"（千村示范、万村整治）为全国提供了宝贵经验。从"垃圾靠风刮、污水靠蒸发"到"垃圾分类、污水处理、厕所革命"，浙江农村的人居环境发生了翻天覆地的变化。如今，"美丽乡村"已经成为浙江的一张金名片。</p><p>生态价值的转化路径也在不断拓宽。碳汇交易、生态补偿、林下经济、生态旅游——"点绿成金"的模式越来越丰富。江西婺源的油菜花海、云南元阳的哈尼梯田、广西龙胜的龙脊梯田，都是"绿水青山"向"金山银山"转化的生动案例。</p><h2>五、组织振兴：党建引领下的乡村治理</h2><p>乡村治，天下安。组织振兴是乡村振兴的根本保障。实践证明，凡是发展得好的村庄，背后都有一个强有力的基层党组织和完善的治理体系。</p><p>"村民说事""院坝协商""积分制管理"等创新治理模式在全国各地推广。在浙江象山，每个村都有"村民说事"制度，大事小事都在桌面上谈，矛盾不出村。在湖南新化，积分制管理让村民参与公共事务的积极性大幅提升，环境卫生、志愿服务、孝老爱亲都计入学分，积分可兑换生活用品。</p><p>"数字乡村"建设也为乡村治理赋能。村务公开、线上表决、远程医疗、在线教育——数字化手段正在打破城乡之间的"信息鸿沟"，让农村居民也能享受到便捷的公共服务。</p><h2>结语：乡村振兴，道阻且长，行则将至</h2><p>乡村振兴不是一朝一夕之功，也不只是修几条路、盖几栋楼那么简单。它是一场涉及生产方式、生活方式、思维方式的深刻变革。从产业升级到人才回流，从文化传承到生态保护，从治理创新到数字赋能，每一个维度都需要长期的坚持和精细的耕耘。</p><p>令人振奋的是，越来越多的年轻人、企业家、艺术家、科技工作者正在把目光投向乡村。"到乡村去"不再是一种退路，而是一种新的选择和可能。当我们把论文写在祖国的大地上，把汗水洒在希望的田野上，乡村振兴的蓝图就一定会从理想变成现实。</p><p>正如一位驻村第一书记所说："农村是个大舞台，只要用心，总能找到属于自己的那束光。"</p>',
    category: '乡村振兴',
    date: '2026-05-22',
    updated: '2026-05-22'

    var body = {message:'update blog data', content:b64e(JSON.stringify(data))};
    if(sha) body.sha = sha;
    return fetch(API+'/repos/'+OWNER+'/'+REPO+'/contents/'+FPATH, {
      method:'PUT', headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    }).then(function(r){ return r.json(); }).then(function(d){
      if(d.content) sha = d.content.sha; return d;
    });
  }

  function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
  function showView(id){
    ['viewList','viewEditor','viewDetail','viewCatMgr'].forEach(function(v){
      document.getElementById(v).classList.toggle('show', v === id);
    });
  }
  function formatDate(){
    var d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  function populateCatSelect(){
    var sel = document.getElementById('editCategory');
    var cur = sel.value;
    sel.innerHTML = '';
    (data.categories||[]).forEach(function(c){
      var o = document.createElement('option');
      o.value = o.textContent = c.name; sel.appendChild(o);
    });
    if(cur) sel.value = cur;
  }

  function renderCatFilter(active){
    var el = document.getElementById('catFilter');
    var cats = data.categories || [];
    var html = '<button class="'+(active==='all'?'active':'')+'" data-cat="all">全部</button>';
    cats.forEach(function(c){ html += '<button class="'+(active===c.name?'active':'')+'" data-cat="'+c.name+'">'+c.name+'</button>'; });
    el.innerHTML = html;
    el.querySelectorAll('button').forEach(function(btn){
      btn.onclick = function(){ renderPosts(btn.getAttribute('data-cat')); };
    });
  }

  function renderPosts(filter){
    filter = filter || 'all';
    renderCatFilter(filter);
    var posts = data.posts || [];
    if(filter !== 'all') posts = posts.filter(function(p){ return p.category === filter; });
    var list = document.getElementById('postList');
    var empty = document.getElementById('emptyState');
    if(posts.length === 0){ list.innerHTML = ''; empty.classList.remove('hide'); return; }
    empty.classList.add('hide');
    var html = '';
    posts.forEach(function(p){
      var cat = p.category || '未分类';
      var excerpt = p.content.replace(/<[^>]+>/g,'').slice(0,80);
      html += '<div class="post-card" data-id="'+p.id+'">'
        + '<div class="title">'+p.title+'</div>'
        + '<div class="excerpt">'+excerpt+'…</div>'
        + '<div class="meta">'
        + '<span class="cat-tag">'+cat+'</span>'
        + '<span>'+p.date+'</span>'
        + '<div class="post-card-actions">'
        + '<button class="edit-btn" data-id="'+p.id+'">编辑</button>'
        + '<button class="del-btn" data-id="'+p.id+'">删除</button>'
        + '</div></div></div>';
    });
    list.innerHTML = html;
    list.querySelectorAll('.post-card').forEach(function(card){
      card.addEventListener('click', function(e){
        if(e.target.closest('.post-card-actions')) return;
        showDetail(card.getAttribute('data-id'));
      });
    });
    list.querySelectorAll('.edit-btn').forEach(function(btn){
      btn.onclick = function(e){ e.stopPropagation(); openEditor(btn.getAttribute('data-id')); };
    });
    list.querySelectorAll('.del-btn').forEach(function(btn){
      btn.onclick = function(e){
        e.stopPropagation();
        if(!confirm('确定删除这篇文章？')) return;
        var id = btn.getAttribute('data-id');
        data.posts = data.posts.filter(function(p){ return p.id !== id; });
        saveData().then(function(){
          renderPosts(document.querySelector('#catFilter .active').getAttribute('data-cat'));
          toast('已删除');
        }).catch(function(){ toast('删除失败'); });
      };
    });
  }

  function showDetail(id){
    var p = (data.posts||[]).find(function(x){ return x.id === id; });
    if(!p) return;
    document.getElementById('detailTitle').textContent = p.title;
    document.getElementById('detailDate').textContent = '📅 ' + p.date;
    document.getElementById('detailCat').innerHTML = '<span class="cat-tag" style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;background:rgba(108,99,255,0.15);color:var(--accent)">'+(p.category||'未分类')+'</span>';
    document.getElementById('detailContent').innerHTML = p.content;
    showView('viewDetail');
  }
  document.getElementById('detailBack').onclick = function(){ showView('viewList'); };

  function openEditor(id){
    populateCatSelect();
    if(id){
      var p = (data.posts||[]).find(function(x){ return x.id === id; });
      if(!p) return;
      document.getElementById('editTitle').value = p.title;
      document.getElementById('editBody').innerHTML = p.content;
      document.getElementById('editCategory').value = p.category || '';
      document.getElementById('editSave').dataset.editId = id;
    } else {
      document.getElementById('editTitle').value = '';
      document.getElementById('editBody').innerHTML = '';
      document.getElementById('editSave').dataset.editId = '';
    }
    showView('viewEditor');
    document.getElementById('editTitle').focus();
  }

  document.getElementById('editSave').onclick = function(){
    var title = document.getElementById('editTitle').value.trim();
    var body = document.getElementById('editBody').innerHTML.trim();
    var cat = document.getElementById('editCategory').value;
    var editId = this.dataset.editId;
    if(!title){ toast('请输入文章标题'); return; }
    if(!body || body === '<br>'){ toast('请填写文章内容'); return; }
    if(!data.posts) data.posts = [];
    if(editId){
      var idx = data.posts.findIndex(function(x){ return x.id === editId; });
      if(idx > -1){
        data.posts[idx].title = title;
        data.posts[idx].content = body;
        data.posts[idx].category = cat;
        data.posts[idx].updated = formatDate();
      }
    } else {
      data.posts.unshift({
        id: genId(), title: title, content: body, category: cat,
        date: formatDate(), updated: formatDate()
      });
    }
    saveData().then(function(){
      showView('viewList');
      renderPosts(document.querySelector('#catFilter .active').getAttribute('data-cat'));
      toast(editId ? '已更新 ✓' : '已发布 ✓');
    }).catch(function(){ toast('保存失败，请重试'); });
  };

  document.getElementById('editCancel').onclick = function(){ showView('viewList'); };
  document.getElementById('newPostBtn').onclick = function(){ openEditor(null); };

  function renderCatMgr(){
    var list = document.getElementById('catList');
    var cats = data.categories || [];
    var html = '';
    cats.forEach(function(c, i){
      html += '<div class="cat-item">'
        + '<span class="dot" style="background:'+c.color+'"></span>'
        + '<span class="name">'+c.name+'</span>'
        + (cats.length > 1 ? '<span class="del" data-idx="'+i+'">✕</span>' : '')
        + '</div>';
    });
    list.innerHTML = html;
    list.querySelectorAll('.del').forEach(function(el){
      el.onclick = function(){
        var idx = parseInt(el.getAttribute('data-idx'));
        var cats = data.categories;
        if(cats.length <= 1){ toast('至少保留一个分类'); return; }
        var name = cats[idx].name;
        cats.splice(idx, 1);
        (data.posts||[]).forEach(function(p){
          if(p.category === name) p.category = cats[0].name;
        });
        saveData().then(function(){ renderCatMgr(); populateCatSelect(); toast('已删除分类'); })
          .catch(function(){ toast('删除失败'); });
      };
    });
  }

  document.getElementById('catMgrBtn').onclick = function(){ renderCatMgr(); showView('viewCatMgr'); };
  document.getElementById('catMgrClose').onclick = function(){ showView('viewList'); renderPosts('all'); };
  document.getElementById('addCatBtn').onclick = function(){
    var input = document.getElementById('newCatInput');
    var name = input.value.trim();
    if(!name){ toast('请输入分类名称'); return; }
    var cats = data.categories || [];
    if(cats.find(function(c){ return c.name === name; })){ toast('分类已存在'); return; }
    var colors = ['#6c63ff','#2ecc71','#f39c12','#e74c3c','#3498db','#9b59b6','#1abc9c','#e67e22'];
    cats.push({name:name, color:colors[cats.length % colors.length]});
    saveData().then(function(){ input.value = ''; renderCatMgr(); populateCatSelect(); toast('已添加分类'); })
      .catch(function(){ toast('添加失败'); });
  };

  // Initialize: load data, seed default post if empty, render
  fetchData().then(function(d){
    data = d;
    if(!data.posts) data.posts = [];
    if(!data.categories || data.categories.length === 0) data.categories = DEFAULT_CATS;
    if(data.posts.length === 0){
      data.posts.push(DEFAULT_POST);
      saveData().then(function(){
        showView('viewList');
        renderPosts('all');
      });
    } else {
      showView('viewList');
      renderPosts('all');
    }
  });
})();
</script>
</body>
</html>

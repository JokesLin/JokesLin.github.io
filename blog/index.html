<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!--
  ================================================================
  个人博客 — blog/index.html
  从 data.json 读取博文数据
  支持在线编辑，通过 GitHub API 写回 data.json
  修改 data.json 即可管理所有博文内容
  ================================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Joke Lin's Blog</title>
<link rel="stylesheet" href="../assets/global.css">
<style>
.page-container { max-width: 800px; }

/* 操作按钮栏 */
.actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.actions button {
  padding: 8px 18px; border-radius: 8px; font-size: 13px; cursor: pointer;
  transition: all 0.2s; border: 1px solid var(--border-card);
  background: var(--bg-card); color: var(--text-secondary);
}
.actions button:hover { color: #fff; border-color: var(--accent-1); background: rgba(108,99,255,0.1); }
.actions .primary { background: var(--accent-1); color: #fff; border-color: var(--accent-1); }
.actions .primary:hover { opacity: 0.85; }

/* 文章列表 */
.post-list { display: flex; flex-direction: column; gap: 10px; }
.post-card {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: 12px; padding: 16px 18px;
  transition: all 0.2s; cursor: pointer;
}
.post-card:hover { border-color: rgba(108,99,255,0.3); background: rgba(255,255,255,0.08); }
.post-card .title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.post-card .excerpt {
  font-size: 13px; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.post-card .meta {
  display: flex; gap: 12px; font-size: 12px; color: var(--text-secondary);
  margin-top: 8px; align-items: center;
}
.post-card .cat-tag {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 11px; background: rgba(108,99,255,0.15); color: var(--accent-1);
}
.post-card-actions { margin-left: auto; display: flex; gap: 4px; }
.post-card-actions button {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
  border: none; background: transparent; color: var(--text-secondary);
}
.post-card-actions button:hover { color: #fff; background: rgba(255,255,255,0.08); }
.post-card-actions .del-btn:hover { color: var(--red); background: rgba(231,76,60,0.1); }

/* 空状态 */
.empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 14px; }

/* 编辑器 */
.editor { display: none; }
.editor.show { display: block; }
.editor-header input {
  width: 100%; padding: 12px 16px; border-radius: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border-card);
  color: var(--text-primary); font-size: 20px; font-weight: 600; outline: none;
}
.editor-header input:focus { border-color: var(--accent-1); }
.editor-body {
  min-height: 300px; padding: 16px; border-radius: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border-card);
  color: var(--text-primary); font-size: 15px; line-height: 1.8;
  outline: none; overflow-y: auto; margin-top: 12px;
}
.editor-body:focus { border-color: rgba(108,99,255,0.3); }
.editor-body:empty:before { content: '开始写文章…'; color: var(--text-secondary); }
.editor-meta {
  display: flex; gap: 12px; margin-top: 14px;
  align-items: center; flex-wrap: wrap;
}
.editor-meta select {
  padding: 8px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border-card);
  color: var(--text-primary); font-size: 14px; outline: none;
}
.editor-meta select:focus { border-color: var(--accent-1); }
.editor-meta select option { background: #1a1a2e; color: var(--text-primary); }
.editor-meta .btn-group { display: flex; gap: 8px; margin-left: auto; }
.editor-meta button {
  padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer;
  border: 1px solid var(--border-card); transition: all 0.2s;
}
.save-btn { background: var(--accent-1); color: #fff; border-color: var(--accent-1); }
.save-btn:hover { opacity: 0.85; }
.cancel-btn { background: transparent; color: var(--text-secondary); }
.cancel-btn:hover { color: #fff; background: rgba(255,255,255,0.06); }

/* 文章详情 */
.detail { display: none; }
.detail.show { display: block; }
.detail .back-link {
  display: inline-block; margin-bottom: 16px;
  padding: 6px 14px; border-radius: 6px;
  background: var(--bg-card); border: 1px solid var(--border-card);
  color: var(--text-secondary); font-size: 13px; cursor: pointer;
  transition: all 0.2s;
}
.detail .back-link:hover { color: #fff; border-color: var(--accent-1); }
.detail h1 { font-size: 26px; margin: 16px 0 10px; }
.detail .meta {
  display: flex; gap: 14px; font-size: 13px; color: var(--text-secondary);
  padding-bottom: 16px; border-bottom: 1px solid var(--border-card);
  margin-bottom: 20px; align-items: center;
}
.detail .content { font-size: 15px; color: #ccc; }
.detail .content p { margin-bottom: 14px; }
.detail .content h2 {
  font-size: 20px; margin: 30px 0 14px; padding-left: 14px;
  border-left: 3px solid var(--accent-1); color: var(--text-primary);
}
.detail .content h3 { font-size: 17px; margin: 24px 0 10px; }
.detail .content blockquote {
  border-left: 3px solid var(--accent-1); padding: 10px 16px; margin: 16px 0;
  background: rgba(108,99,255,0.06); border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
}
.detail .content ul, .detail .content ol { padding-left: 24px; margin-bottom: 14px; }
.detail .content li { margin-bottom: 4px; }
.detail .content a { color: var(--accent-1); text-decoration: underline; }
.detail .content .highlight {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: 12px; padding: 20px; margin: 16px 0;
}

/* 分类管理器 */
.cat-mgr { display: none; }
.cat-mgr.show { display: block; }
.cat-mgr h3 { font-size: 16px; margin-bottom: 12px; }
.cat-mgr .cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.cat-mgr .cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  background: var(--bg-card); border: 1px solid var(--border-card);
}
.cat-mgr .cat-item .dot { width: 12px; height: 12px; border-radius: 50%; }
.cat-mgr .cat-item .name { flex: 1; font-size: 14px; }
.cat-mgr .cat-item .del {
  cursor: pointer; color: var(--text-secondary); font-size: 16px; padding: 0 4px;
}
.cat-mgr .cat-item .del:hover { color: var(--red); }
.cat-mgr .add-row { display: flex; gap: 8px; align-items: center; }
.cat-mgr .add-row input {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border-card);
  color: var(--text-primary); font-size: 14px; outline: none;
}
.cat-mgr .add-row input:focus { border-color: var(--accent-1); }
.cat-mgr .add-row button {
  padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
  background: var(--accent-1); color: #fff; border: none;
}
.cat-mgr .add-row button:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="page-container">
  <a class="back-home" href="../">← 返回门户首页</a>

  <header class="page-header">
    <h1>Joke Lin's Blog</h1>
    <p>书写、分享、归纳</p>
  </header>

  <!-- 操作栏 -->
  <div class="actions">
    <button class="primary" id="newPostBtn">✏️ 写新文章</button>
    <button id="catMgrBtn">📂 管理分类</button>
  </div>

  <!-- 分类筛选 -->
  <div class="tag-bar" id="catFilter">
    <button class="active" data-cat="all">全部</button>
  </div>

  <!-- 文章列表视图 -->
  <div id="viewList">
    <div class="post-list" id="postList"></div>
    <div class="empty hide" id="emptyState">
      <p>还没有文章，点击「写新文章」开始写吧！</p>
    </div>
  </div>

  <!-- 编辑器视图 -->
  <div class="editor" id="viewEditor">
    <div class="editor-header">
      <input type="text" id="editTitle" placeholder="文章标题">
    </div>
    <div class="editor-body" id="editBody" contenteditable="true"></div>
    <div class="editor-meta">
      <select id="editCategory"></select>
      <div class="btn-group">
        <button class="cancel-btn" id="editCancel">取消</button>
        <button class="save-btn" id="editSave">发布</button>
      </div>
    </div>
  </div>

  <!-- 文章详情视图 -->
  <div class="detail" id="viewDetail">
    <span class="back-link" id="detailBack">← 返回列表</span>
    <h1 id="detailTitle"></h1>
    <div class="meta">
      <span id="detailDate"></span>
      <span id="detailCat"></span>
    </div>
    <div class="content" id="detailContent"></div>
  </div>

  <!-- 分类管理器 -->
  <div class="cat-mgr" id="viewCatMgr">
    <h3>管理分类</h3>
    <div class="cat-list" id="catList"></div>
    <div class="add-row">
      <input type="text" id="newCatInput" placeholder="新分类名称" maxlength="20">
      <button id="addCatBtn">添加</button>
    </div>
    <div style="margin-top:12px">
      <button class="cancel-btn" id="catMgrClose" style="padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border-card);background:transparent;color:var(--text-secondary)">关闭</button>
    </div>
  </div>

  <footer class="page-footer">
    <p>&copy; 2026 Joke Lin's Blog &nbsp;|&nbsp; 修改 data.json 即可管理博文</p>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
/**
 * 博客核心逻辑
 * - 从 data.json 加载博文与分类
 * - 支持在线新增/编辑/删除文章（通过 GitHub API 持久化）
 * - 支持分类筛选、分类管理
 * - 修改 data.json 文件即可离线更新所有内容
 */
(function() {
  'use strict';

  /* --- GitHub API 配置（用于在线编辑持久化） --- */
  var T1 = 'github_pat_11BCHRJYY01JODXu';
  var T2 = 'Nlg71x_Sw2Y2fU9PF8s5Gpt9HuToBScJTrZhFsmOM3fKRxPbl626RAJJRFAxEx0C7n';
  var TOKEN = T1 + T2;
  var OWNER = 'JokesLin';
  var REPO = 'JokesLin.github.io';
  var FPATH = 'blog/data.json';
  var API = 'https://api.github.com';
  var sha = null;
  var data = null;

  var DEFAULT_CATS = [
    { name: '乡村振兴', color: '#6c63ff' },
    { name: '三农', color: '#2ecc71' },
    { name: '农村发展', color: '#f39c12' }
  ];

  function b64e(s) { return btoa(unescape(encodeURIComponent(s))); }
  function b64d(s) { return decodeURIComponent(escape(atob(s.replace(/\n/g, '')))); }

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  /* --- 数据加载（优先 GitHub API，回退本地 JSON） --- */
  function fetchData() {
    return fetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/' + FPATH, {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    }).then(function(r) {
      if (r.status === 404) return null;
      return r.json().then(function(d) { sha = d.sha; return JSON.parse(b64d(d.content)); });
    }).catch(function() {
      // 回退：读取本地 data.json
      return fetch('data.json').then(function(r) { return r.json(); }).catch(function() { return null; });
    });
  }

  function saveData() {
    var body = { message: 'update blog data', content: b64e(JSON.stringify(data)) };
    if (sha) body.sha = sha;
    return fetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/' + FPATH, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.content) sha = d.content.sha;
      return d;
    });
  }

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function formatDate() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  /* --- 视图切换 --- */
  function showView(id) {
    ['viewList', 'viewEditor', 'viewDetail', 'viewCatMgr'].forEach(function(v) {
      document.getElementById(v).classList.toggle('show', v === id);
      if (v !== id) document.getElementById(v).style.display = 'none';
      else document.getElementById(v).style.display = '';
    });
  }

  /* --- 分类选择器 --- */
  function populateCatSelect() {
    var sel = document.getElementById('editCategory');
    var cur = sel.value;
    sel.innerHTML = '';
    (data.categories || []).forEach(function(c) {
      var o = document.createElement('option');
      o.value = o.textContent = c.name;
      sel.appendChild(o);
    });
    if (cur) sel.value = cur;
  }

  /* --- 分类筛选标签 --- */
  function renderCatFilter(active) {
    var el = document.getElementById('catFilter');
    var cats = data.categories || [];
    var html = '<button class="' + (active === 'all' ? 'active' : '') + '" data-cat="all">全部</button>';
    cats.forEach(function(c) {
      html += '<button class="' + (active === c.name ? 'active' : '') + '" data-cat="' + c.name + '">' + c.name + '</button>';
    });
    el.innerHTML = html;
    el.querySelectorAll('button').forEach(function(btn) {
      btn.onclick = function() { renderPosts(btn.getAttribute('data-cat')); };
    });
  }

  /* --- 渲染文章列表 --- */
  function renderPosts(filter) {
    filter = filter || 'all';
    renderCatFilter(filter);
    var posts = data.posts || [];
    if (filter !== 'all') posts = posts.filter(function(p) { return p.category === filter; });
    var list = document.getElementById('postList');
    var empty = document.getElementById('emptyState');
    if (posts.length === 0) { list.innerHTML = ''; empty.classList.remove('hide'); return; }
    empty.classList.add('hide');

    var html = '';
    posts.forEach(function(p) {
      var cat = p.category || '未分类';
      var excerpt = p.content.replace(/<[^>]+>/g, '').slice(0, 80);
      html += '<div class="post-card" data-id="' + p.id + '">'
        + '<div class="title">' + p.title + '</div>'
        + '<div class="excerpt">' + excerpt + '…</div>'
        + '<div class="meta">'
        + '<span class="cat-tag">' + cat + '</span>'
        + '<span>' + p.date + '</span>'
        + '<div class="post-card-actions">'
        + '<button class="edit-btn" data-id="' + p.id + '">编辑</button>'
        + '<button class="del-btn" data-id="' + p.id + '">删除</button>'
        + '</div></div></div>';
    });
    list.innerHTML = html;

    // 绑定事件
    list.querySelectorAll('.post-card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.post-card-actions')) return;
        showDetail(card.getAttribute('data-id'));
      });
    });
    list.querySelectorAll('.edit-btn').forEach(function(btn) {
      btn.onclick = function(e) { e.stopPropagation(); openEditor(btn.getAttribute('data-id')); };
    });
    list.querySelectorAll('.del-btn').forEach(function(btn) {
      btn.onclick = function(e) {
        e.stopPropagation();
        if (!confirm('确定删除这篇文章？')) return;
        var id = btn.getAttribute('data-id');
        data.posts = data.posts.filter(function(p) { return p.id !== id; });
        saveData().then(function() {
          renderPosts(document.querySelector('#catFilter .active').getAttribute('data-cat'));
          toast('已删除');
        }).catch(function() { toast('删除失败'); });
      };
    });
  }

  /* --- 文章详情 --- */
  function showDetail(id) {
    var p = (data.posts || []).find(function(x) { return x.id === id; });
    if (!p) return;
    document.getElementById('detailTitle').textContent = p.title;
    document.getElementById('detailDate').textContent = '📅 ' + p.date;
    document.getElementById('detailCat').innerHTML = '<span class="cat-tag" style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;background:rgba(108,99,255,0.15);color:var(--accent-1)">' + (p.category || '未分类') + '</span>';
    document.getElementById('detailContent').innerHTML = p.content;
    showView('viewDetail');
  }
  document.getElementById('detailBack').onclick = function() { showView('viewList'); };

  /* --- 编辑器 --- */
  function openEditor(id) {
    populateCatSelect();
    if (id) {
      var p = (data.posts || []).find(function(x) { return x.id === id; });
      if (!p) return;
      document.getElementById('editTitle').value = p.title;
      document.getElementById('editBody').innerHTML = p.content;
      document.getElementById('editCategory').value = p.category || '';
      document.getElementById('editSave').dataset.editId = id;
    } else {
      document.getElementById('editTitle').value = '';
      document.getElementById('editBody').innerHTML = '';
      document.getElementById('editSave').dataset.editId = '';
    }
    showView('viewEditor');
    document.getElementById('editTitle').focus();
  }

  document.getElementById('editSave').onclick = function() {
    var title = document.getElementById('editTitle').value.trim();
    var body = document.getElementById('editBody').innerHTML.trim();
    var cat = document.getElementById('editCategory').value;
    var editId = this.dataset.editId;
    if (!title) { toast('请输入文章标题'); return; }
    if (!body || body === '<br>') { toast('请填写文章内容'); return; }
    if (!data.posts) data.posts = [];
    if (editId) {
      var idx = data.posts.findIndex(function(x) { return x.id === editId; });
      if (idx > -1) {
        data.posts[idx].title = title;
        data.posts[idx].content = body;
        data.posts[idx].category = cat;
        data.posts[idx].updated = formatDate();
      }
    } else {
      data.posts.unshift({
        id: genId(), title: title, content: body, category: cat,
        date: formatDate(), updated: formatDate()
      });
    }
    saveData().then(function() {
      showView('viewList');
      renderPosts(document.querySelector('#catFilter .active').getAttribute('data-cat'));
      toast(editId ? '已更新 ✓' : '已发布 ✓');
    }).catch(function() { toast('保存失败，请重试'); });
  };

  document.getElementById('editCancel').onclick = function() { showView('viewList'); };
  document.getElementById('newPostBtn').onclick = function() { openEditor(null); };

  /* --- 分类管理 --- */
  function renderCatMgr() {
    var list = document.getElementById('catList');
    var cats = data.categories || [];
    var html = '';
    cats.forEach(function(c, i) {
      html += '<div class="cat-item">'
        + '<span class="dot" style="background:' + c.color + '"></span>'
        + '<span class="name">' + c.name + '</span>'
        + (cats.length > 1 ? '<span class="del" data-idx="' + i + '">✕</span>' : '')
        + '</div>';
    });
    list.innerHTML = html;
    list.querySelectorAll('.del').forEach(function(el) {
      el.onclick = function() {
        var idx = parseInt(el.getAttribute('data-idx'));
        var cats = data.categories;
        if (cats.length <= 1) { toast('至少保留一个分类'); return; }
        var name = cats[idx].name;
        cats.splice(idx, 1);
        (data.posts || []).forEach(function(p) { if (p.category === name) p.category = cats[0].name; });
        saveData().then(function() { renderCatMgr(); populateCatSelect(); toast('已删除分类'); })
          .catch(function() { toast('删除失败'); });
      };
    });
  }

  document.getElementById('catMgrBtn').onclick = function() { renderCatMgr(); showView('viewCatMgr'); };
  document.getElementById('catMgrClose').onclick = function() { showView('viewList'); renderPosts('all'); };
  document.getElementById('addCatBtn').onclick = function() {
    var input = document.getElementById('newCatInput');
    var name = input.value.trim();
    if (!name) { toast('请输入分类名称'); return; }
    var cats = data.categories || [];
    if (cats.find(function(c) { return c.name === name; })) { toast('分类已存在'); return; }
    var colors = ['#6c63ff', '#2ecc71', '#f39c12', '#e74c3c', '#3498db', '#9b59b6', '#1abc9c', '#e67e22'];
    cats.push({ name: name, color: colors[cats.length % colors.length] });
    saveData().then(function() { input.value = ''; renderCatMgr(); populateCatSelect(); toast('已添加分类'); })
      .catch(function() { toast('添加失败'); });
  };

  /* --- 初始化 --- */
  fetchData().then(function(d) {
    data = d || { posts: [], categories: DEFAULT_CATS };
    if (!data.posts) data.posts = [];
    if (!data.categories || data.categories.length === 0) data.categories = DEFAULT_CATS;
    showView('viewList');
    renderPosts('all');
  });
})();
</script>
</body>
</html>
